{% extends 'dashboard/base.html' %}
{% block title %}Admin{% endblock %}
{% block page_title %}Admin{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h3 class="card-title">Lista Admin</h3>
        <a href="{% url 'admin_create' %}" class="btn btn-primary btn-sm"><i class="fas fa-plus"></i> Foun</a>
    </div>
    <div class="card-body table-responsive p-0">
        <table class="table table-hover">
            <thead><tr><th>ID</th><th>Username</th><th>Aksaun</th></tr></thead>
            <tbody>
                {% for obj in object_list %}
                <tr>
                    <td>{{ obj.id }}</td>
                    <td>{{ obj.username }}</td>
                    <td>
                        <a href="{% url 'admin_update' obj.pk %}" class="btn btn-warning btn-sm"><i class="fas fa-edit"></i></a>
                        <a href="{% url 'admin_delete' obj.pk %}" class="btn btn-danger btn-sm"><i class="fas fa-trash"></i></a>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="3" class="text-center">Laiha admin</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
