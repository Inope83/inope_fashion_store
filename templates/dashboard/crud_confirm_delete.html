{% extends 'dashboard/base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body text-center py-5">
        <h4>Ita boot hakarak hamos {{ object }}?</h4>
        <p class="text-muted">Asaun ida ne'e la bele fila fali.</p>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2 justify-content-center">
                <button type="submit" class="btn btn-danger">Sim, Hamos</button>
                <a href="{{ cancel_url }}" class="btn btn-secondary">Kansela</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
