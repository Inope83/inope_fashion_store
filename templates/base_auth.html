{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>{% block title %}Inope Store{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="{% static 'css/style.css' %}" rel="stylesheet" />
</head>
<body class="bg-light" style="background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%) !important; min-height: 100vh;">
    {% if messages %}
        <div class="container pt-3">
            {% for msg in messages %}
                <div class="alert-store alert-{% if msg.tags == 'error' %}error{% elif msg.tags == 'success' %}success{% else %}info{% endif %} alert-dismissible fade show d-flex align-items-center justify-content-between">
                    <span>{% if msg.tags == 'success' %}<i class="bi-check-circle-fill me-2"></i>{% elif msg.tags == 'error' %}<i class="bi-exclamation-circle-fill me-2"></i>{% else %}<i class="bi-info-circle-fill me-2"></i>{% endif %}{{ msg }}</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        </div>
    {% endif %}
    {% block content %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
